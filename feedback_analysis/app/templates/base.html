<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FeedbackIQ{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🧠</span>
      <span class="logo-text">FeedbackIQ</span>
    </div>
    <nav class="sidebar-nav">
      <a href="{{ url_for('main.index') }}" class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}">
        <span>📊</span> Dashboard
      </a>
      <a href="{{ url_for('main.upload') }}" class="nav-link {% if request.endpoint == 'main.upload' %}active{% endif %}">
        <span>📂</span> Analyze Feedback
      </a>
      <a href="{{ url_for('main.results') }}" class="nav-link {% if request.endpoint == 'main.results' %}active{% endif %}">
        <span>📈</span> Results
      </a>
      <a href="{{ url_for('main.about') }}" class="nav-link {% if request.endpoint == 'main.about' %}active{% endif %}">
        <span>ℹ️</span> About
      </a>
    </nav>
    <div class="sidebar-footer">
      <span>AI-Powered NLP Analysis</span>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
